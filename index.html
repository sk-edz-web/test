<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SonicMonitor - Secure Gateway</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="center-layout">
    <div class="rotate-warning"><h2>🔄 Rotate phone to Landscape Mode</h2></div>

    <div id="loadingBox" class="panel" style="display: none; text-align: center;">
        <div class="spinner" style="margin: 0 auto 15px;"></div>
        <h2 class="neon-text">Encrypting Channel...</h2>
        <p class="sub-label">Assigning Node IP...</p>
    </div>

    <div id="loginBox" class="login-panel panel">
        <h1 class="neon-text" style="text-align: center; margin-bottom: 5px;">SonicMonitor</h1>
        <p class="sub-label" style="text-align: center; margin-bottom: 25px;">Secure Node Gateway</p>
        <button id="startBtn" class="btn primary full-width">Initialize Control Room</button>
    </div>

    <script>
        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('loadingBox').style.display = 'block';
            if(!localStorage.getItem('sonic_user_ip')) {
                const ip = `192.168.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
                localStorage.setItem('sonic_user_ip', ip);
            }
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
        });
    </script>
</body>
</html>
