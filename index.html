<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Audio Call Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f3f4f6; color: #111827; text-align: center; padding: 20px; }
        .call-container { display: flex; justify-content: center; gap: 40px; margin-top: 30px; flex-wrap: wrap; }
        
        /* Audio Call UI avatars */
        .avatar-box { background: white; width: 150px; height: 150px; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 4px solid transparent; transition: 0.3s;}
        .avatar-box.active { border-color: #3b82f6; animation: pulse 1.5s infinite; }
        .avatar-box span { font-size: 3rem; }
        .avatar-box p { margin-top: 10px; font-weight: 600; color: #6b7280; }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        .controls { margin-top: 40px; background: white; padding: 25px; border-radius: 16px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        button { padding: 12px 24px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #3b82f6; color: white; margin: 5px; font-size: 1rem; transition: 0.2s;}
        button:hover:not(:disabled) { background: #2563eb; transform: translateY(-2px); }
        button:disabled { background: #d1d5db; color: #9ca3af; cursor: not-allowed; }
        input { padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; width: 280px; text-align: center; font-size: 1rem; margin-bottom: 10px; outline: none;}
        input:focus { border-color: #3b82f6; }
        #call-id-display { font-size: 1.2rem; font-weight: 700; color: #ef4444; margin: 15px 0; background: #fee2e2; padding: 10px; border-radius: 8px; display: inline-block;}
    </style>
</head>
<body>

    <h2>📞 1-on-1 Secure Audio Call Demo</h2>
    
    <div class="call-container">
        <div class="avatar-box" id="localAvatar">
            <span>🎧</span>
            <p>You</p>
        </div>
        <div class="avatar-box" id="remoteAvatar">
            <span>🎙️</span>
            <p>Friend</p>
        </div>
    </div>

    <audio id="localAudio" autoplay muted></audio>
    <audio id="remoteAudio" autoplay></audio>

    <div class="controls">
        <button id="micBtn">1. Enable Microphone</button>
        <hr style="border:0; border-top:1px solid #e5e7eb; margin:20px 0;">
        
        <div>
            <button id="createBtn" disabled>2. Start New Call</button>
            <br>
            <span id="call-id-display" style="display: none;"></span>
        </div>
        
        <hr style="border:0; border-top:1px solid #e5e7eb; margin:20px 0;">
        
        <div>
            <input type="text" id="callIdInput" placeholder="Enter Friend's Call ID">
            <br>
            <button id="joinBtn" disabled>3. Join Call</button>
        </div>
        
        <hr style="border:0; border-top:1px solid #e5e7eb; margin:20px 0;">
        <button id="hangupBtn" style="background: #ef4444;" disabled>End Call</button>
    </div>

    <script type="module">
        // Firebase Setup (Unga database config)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, get, push, onValue, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD4FPU1uapSWjbpyR1Jjf854T7V4qMV-TM",
            authDomain: "skedz-a13eb.firebaseapp.com",
            databaseURL: "https://skedz-a13eb-default-rtdb.firebaseio.com",
            projectId: "skedz-a13eb",
            storageBucket: "skedz-a13eb.firebasestorage.app",
            messagingSenderId: "318431223204",
            appId: "1:318431223204:web:e53e09d5215773b41eb531"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // WebRTC Setup (Google's free STUN server)
        const servers = {
            iceServers: [
                { urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }
            ]
        };

        let peerConnection;
        let localStream;
        let remoteStream;

        const localAudio = document.getElementById('localAudio');
        const remoteAudio = document.getElementById('remoteAudio');
        const micBtn = document.getElementById('micBtn');
        const createBtn = document.getElementById('createBtn');
        const joinBtn = document.getElementById('joinBtn');
        const hangupBtn = document.getElementById('hangupBtn');
        const callIdInput = document.getElementById('callIdInput');
        const callIdDisplay = document.getElementById('call-id-display');
        const localAvatar = document.getElementById('localAvatar');
        const remoteAvatar = document.getElementById('remoteAvatar');

        let currentCallId = null;

        // Step 1: Get Mic access only (video: false)
        micBtn.onclick = async () => {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
                localAudio.srcObject = localStream;
                
                localAvatar.classList.add('active'); // Add pulse animation
                
                // Enable call buttons
                createBtn.disabled = false;
                joinBtn.disabled = false;
                micBtn.disabled = true;
                micBtn.innerText = "Microphone Enabled ✓";
            } catch (error) {
                alert("Microphone permission denied! Please allow access.");
            }
        };

        // Step 2: Create a Call (Caller)
        createBtn.onclick = async () => {
            createBtn.disabled = true;
            joinBtn.disabled = true;
            hangupBtn.disabled = false;

            // Generate a unique Call ID
            const callRef = push(ref(db, 'calls'));
            currentCallId = callRef.key;
            
            callIdDisplay.style.display = "inline-block";
            callIdDisplay.innerText = `Share this ID: ${currentCallId}`;

            // Initialize Peer Connection
            peerConnection = new RTCPeerConnection(servers);
            remoteStream = new MediaStream();
            remoteAudio.srcObject = remoteStream;

            // Push local tracks (audio) to peer connection
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            // Pull remote tracks when available
            peerConnection.ontrack = event => {
                event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
                remoteAvatar.classList.add('active'); // Pulse animation for friend
            };

            // Handle ICE Candidates
            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    push(ref(db, `calls/${currentCallId}/callerCandidates`), event.candidate.toJSON());
                }
            };

            // Create Offer
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            await set(ref(db, `calls/${currentCallId}/offer`), { type: offer.type, sdp: offer.sdp });

            // Listen for Remote Answer
            onValue(ref(db, `calls/${currentCallId}/answer`), snap => {
                const data = snap.val();
                if (!peerConnection.currentRemoteDescription && data) {
                    const answerDescription = new RTCSessionDescription(data);
                    peerConnection.setRemoteDescription(answerDescription);
                }
            });

            // Listen for Remote ICE Candidates
            onChildAdded(ref(db, `calls/${currentCallId}/calleeCandidates`), snap => {
                const data = snap.val();
                if (data) {
                    peerConnection.addIceCandidate(new RTCIceCandidate(data));
                }
            });
        };

        // Step 3: Join a Call (Receiver)
        joinBtn.onclick = async () => {
            const callId = callIdInput.value.trim();
            if (!callId) return alert("Please enter a Call ID");
            
            currentCallId = callId;
            const offerSnap = await get(ref(db, `calls/${currentCallId}/offer`));
            if (!offerSnap.exists()) return alert("Call ID not found! Check if it's correct.");

            createBtn.disabled = true;
            joinBtn.disabled = true;
            hangupBtn.disabled = false;

            // Initialize Peer Connection
            peerConnection = new RTCPeerConnection(servers);
            remoteStream = new MediaStream();
            remoteAudio.srcObject = remoteStream;

            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = event => {
                event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
                remoteAvatar.classList.add('active'); // Pulse animation for friend
            };

            // Handle ICE Candidates
            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    push(ref(db, `calls/${currentCallId}/calleeCandidates`), event.candidate.toJSON());
                }
            };

            // Get Offer and Set Remote Description
            const offerData = offerSnap.val();
            const offerDescription = new RTCSessionDescription(offerData);
            await peerConnection.setRemoteDescription(offerDescription);

            // Create Answer
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            await set(ref(db, `calls/${currentCallId}/answer`), { type: answer.type, sdp: answer.sdp });

            // Listen for Remote ICE Candidates
            onChildAdded(ref(db, `calls/${currentCallId}/callerCandidates`), snap => {
                const data = snap.val();
                if (data) {
                    peerConnection.addIceCandidate(new RTCIceCandidate(data));
                }
            });
        };

        // Hangup Call
        hangupBtn.onclick = async () => {
            if (peerConnection) peerConnection.close();
            if (localStream) localStream.getTracks().forEach(track => track.stop());
            
            if (currentCallId) {
                await remove(ref(db, `calls/${currentCallId}`));
            }
            window.location.reload(); // Refresh to reset UI
        };
    </script>
</body>
</html>
