<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SK-Commerse • Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body { background: #f8fafc; font-family: 'Inter', sans-serif; }
    .navbar-brand { font-weight: 800; background: linear-gradient(45deg, #1e293b, #4f46e5); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .sidebar { background: white; border-radius: 28px; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.05); padding: 1.8rem 1rem; height: calc(100vh - 2.5rem); position: sticky; top: 1.25rem; }
    .main-content { background: white; border-radius: 28px; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.05); padding: 2rem; min-height: 85vh; }
    .nav-link { color: #334155; border-radius: 16px; padding: 0.8rem 1.2rem; margin-bottom: 0.3rem; font-weight: 500; }
    .nav-link i { width: 28px; color: #64748b; }
    .nav-link:hover, .nav-link.active { background: #ede9fe; color: #4f46e5; }
    .btn-gradient { background: linear-gradient(145deg, #4f46e5, #7c3aed); border: none; color: white; font-weight: 600; padding: 0.7rem 2rem; border-radius: 40px; box-shadow: 0 8px 14px -6px #4f46e580; }
    .btn-gradient:hover { background: #4338ca; transform: translateY(-2px); color: white; }
    .card-product { border-radius: 20px; border: none; box-shadow: 0 8px 20px -6px rgba(0,0,0,0.1); transition: 0.2s; }
    .preview-frame { border: none; width: 100%; height: 500px; border-radius: 24px; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg px-4 py-3">
    <div class="container-fluid">
      <a class="navbar-brand" href="#"><i class="fas fa-store me-2"></i>SK-Commerse</a>
      <div class="d-flex align-items-center">
        <span class="me-3 fw-semibold" id="user-greeting"></span>
        <button class="btn btn-outline-secondary btn-sm rounded-pill px-4" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>
  </nav>
  <div class="container-fluid px-4 pb-4">
    <div class="row g-4">
      <div class="col-lg-2 col-md-3">
        <div class="sidebar">
          <div class="text-center mb-4">
            <i class="fas fa-store fa-3x text-primary mb-2"></i>
            <h5 id="sidebar-business">My Store</h5>
            <span class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-pill mt-1" id="plan-badge">Free</span>
          </div>
          <nav class="nav flex-column">
            <a class="nav-link active" href="#" data-section="dashboard"><i class="fas fa-chart-pie"></i> Dashboard</a>
            <a class="nav-link" href="#" data-section="products"><i class="fas fa-box"></i> Products</a>
            <a class="nav-link" href="#" data-section="orders"><i class="fas fa-truck"></i> Orders</a>
            <a class="nav-link" href="#" data-section="builder"><i class="fas fa-paint-brush"></i> Site Builder</a>
            <a class="nav-link" href="#" data-section="settings"><i class="fas fa-cog"></i> Settings</a>
          </nav>
          <hr>
          <div class="small text-secondary text-center" id="free-cards-info"></div>
        </div>
      </div>
      <div class="col-lg-10 col-md-9">
        <div class="main-content" id="main-panel">
          <div class="text-center py-5 text-secondary">Loading...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modals -->
  <div class="modal fade" id="globalModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-scrollable modal-lg"><div class="modal-content rounded-4" id="globalModalContent"></div></div>
  </div>
  <div class="modal fade" id="previewModal" tabindex="-1"><div class="modal-dialog modal-xl"><div class="modal-content"><div class="modal-header"><h5>Preview</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body p-0"><iframe id="preview-iframe" class="preview-frame"></iframe></div></div></div></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
