<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SK-Commerse • Super Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body { background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; display: flex; align-items: center; font-family: 'Segoe UI', sans-serif; }
    .admin-card { background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); border-radius: 2rem; border: none; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3); padding: 2rem; }
    .brand { font-weight: 800; background: linear-gradient(45deg, #4f46e5, #06b6d4); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .btn-gradient { background: linear-gradient(145deg, #4f46e5, #7c3aed); border: none; color: white; font-weight: 600; padding: 0.75rem 2rem; border-radius: 40px; box-shadow: 0 8px 14px -6px #4f46e580; }
    .btn-gradient:hover { background: #4338ca; transform: translateY(-2px); }
    .form-control { border-radius: 30px; padding: 12px 20px; }
    .key-display { background: #f1f5f9; border-radius: 20px; padding: 1.5rem; font-family: monospace; }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="admin-card">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="brand"><i class="fas fa-crown me-2"></i>Super Admin</h2>
            <button class="btn btn-link text-secondary" id="logoutAdmin"><i class="fas fa-sign-out-alt fa-lg"></i></button>
          </div>
          <p class="text-secondary mb-4">Generate product keys for users</p>
          <div id="adminPanel">
            <div class="mb-3">
              <label class="form-label fw-semibold">User Email / Username</label>
              <input type="text" class="form-control" id="adminUserIdentifier" placeholder="user@example.com or username" required>
              <div class="form-text">Enter the email or username used during signup</div>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Validity (Days)</label>
              <input type="number" class="form-control" id="adminDays" value="30" min="1" required>
            </div>
            <button class="btn btn-gradient w-100" id="genKeyBtn">
              <i class="fas fa-key me-2"></i>Generate Key
            </button>
            <div id="keyResult" class="mt-4"></div>
          </div>
          <div class="text-center mt-4 small text-secondary"><i class="fas fa-shield-alt"></i> Secure Panel</div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="script.js"></script>
</body>
</html>
