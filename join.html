<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Room - SonicMonitor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="rotate-warning"><h2>🔄 Rotate phone to Landscape Mode</h2></div>

    <div class="app-container">
        <main class="main-content" style="flex-direction: row; gap: 20px;">
            
            <!-- Left: Chat & Voice Msgs -->
            <section class="panel" style="flex: 2; display: flex; flex-direction: column;">
                <header class="panel-header" style="border-bottom: 1px solid #333; padding-bottom: 10px;">
                    <h2 class="neon-text">Secure Channel: <span id="targetIpTitle" style="color:#fff;"></span></h2>
                    <a href="dashboard.html" class="btn outline" style="text-decoration: none;">Exit Room</a>
                </header>
                
                <div id="chatBox" class="chat-messages" style="flex: 1; height: auto; margin-bottom: 15px;">
                    <p style="color:gray; font-size:12px; text-align:center;">End-to-End Encrypted Session Started.</p>
                </div>
                
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="text" id="chatInput" placeholder="Type a message..." style="flex: 1;">
                    <button id="sendChatBtn" class="btn primary">Send</button>
                    <!-- Hold to Talk Button -->
                    <button id="pttBtn" class="btn outline" style="border-color: #f39c12; color: #f39c12; min-width: 120px;">🎤 Hold to Talk</button>
                </div>
            </section>

            <!-- Right: Live Call & Visuals -->
            <section class="panel" style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
                <h3 class="neon-text" style="margin-bottom: 20px;">Live Voice Stream</h3>
                
                <!-- WebRTC Audio Elements (Hidden) -->
                <audio id="remoteAudio" autoplay></audio>
                <audio id="localAudio" autoplay muted></audio>

                <div class="canvas-container" style="width: 100%; height: 150px; margin-bottom: 20px; border-radius: 50%; width: 150px; border: 2px solid var(--accent-primary);">
                    <canvas id="liveCallVisualizer"></canvas>
                </div>

                <p id="callStatus" style="color: gray; margin-bottom: 20px;">Standby...</p>

                <button id="startCallBtn" class="btn primary full-width" style="padding: 15px; font-size: 1.1rem;">📞 Start Live Call</button>
                <button id="endCallBtn" class="btn outline full-width" style="padding: 15px; font-size: 1.1rem; border-color: #ff4757; color: #ff4757; display: none; margin-top: 10px;">Hang Up</button>
            </section>
        </main>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
