<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SK-Commerse • Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body { background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; display: flex; align-items: center; font-family: 'Inter', sans-serif; }
    .card { border-radius: 2rem; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border: none; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    .btn-primary { background: #4f46e5; border: none; padding: 12px; font-weight: 600; border-radius: 40px; }
    .btn-primary:hover { background: #4338ca; transform: scale(1.02); }
    .brand { font-weight: 800; background: linear-gradient(45deg, #4f46e5, #06b6d4); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .form-control { border-radius: 30px; padding: 12px 20px; border: 1px solid #e2e8f0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="card p-4 p-md-5">
          <div class="text-center mb-4">
            <h2 class="brand"><i class="fas fa-store-alt me-2"></i>SK-Commerse</h2>
            <p class="text-secondary">Launch your store today</p>
          </div>
          <div id="auth-box">
            <form id="login-form">
              <div class="mb-3"><input type="email" class="form-control" id="login-email" placeholder="Email" required></div>
              <div class="mb-3"><input type="password" class="form-control" id="login-password" placeholder="Password" required></div>
              <button type="submit" class="btn btn-primary w-100 mb-3"><i class="fas fa-sign-in-alt me-2"></i>Log In</button>
              <p class="text-center mb-0">New? <a href="#" id="show-signup" class="fw-bold" style="color:#4f46e5;">Create account</a></p>
            </form>
            <form id="signup-form" style="display:none;">
              <div class="mb-3"><input type="email" class="form-control" id="signup-email" placeholder="Email" required></div>
              <div class="mb-3"><input type="password" class="form-control" id="signup-password" placeholder="Password (min 6 chars)" minlength="6" required></div>
              <button type="submit" class="btn btn-primary w-100 mb-3"><i class="fas fa-user-plus me-2"></i>Sign Up</button>
              <p class="text-center mb-0"><a href="#" id="show-login" class="fw-bold" style="color:#4f46e5;">Back to Login</a></p>
            </form>
          </div>
          <div id="auth-message" class="text-danger small mt-3 text-center"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="script.js"></script>
</body>
</html>
